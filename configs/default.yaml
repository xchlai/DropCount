simulation:
  n_droplets: 1024
  true_copy_range: [0, 200000]
  copy_sampling_mode: log_uniform_integer
  simulation_mode: fixed_total_multinomial
  random_seed: 123
  train_samples_per_epoch: 256
  val_samples: 96
  test_samples_per_combo: 12
  test_n_droplets: [1000, 5000]
  copy_bins: [0, 10, 100, 1000, 10000, 100000, 200000]
  distributions:
    name: lognormal
    cv: 0.2
    train_names: [monodisperse, lognormal, gamma, two_point]
    eval_names: [monodisperse, lognormal, gamma, truncated_normal, two_point, binomial_mapped]
    cv_values: [0.0, 0.05, 0.1, 0.2, 0.3, 0.5]
    lognormal_sigma_cap: 2.0
    binomial_k: 10
    positive_floor: 1.0e-6
model:
  model_type: perceiver
  input_dim: 10
  hidden_dim: 96
  latent_dim: 96
  num_latents: 16
  num_heads: 4
  num_self_attn_layers: 2
  dropout: 0.1
  fourier_features: 2
  use_rmsnorm: false
training:
  batch_size: 8
  epochs: 4
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  loss_name: huber_log
  linear_loss_weight: 0.05
  huber_delta: 0.5
  early_stopping_patience: 3
  num_workers: 0
  amp: true
  device: auto
output:
  run_root: outputs
  run_name: demo_run
  save_validation_dataset: true
baselines:
  max_copy_cap: 1000000.0
  eps: 1.0e-12
  mle_search_upper_multiplier: 20.0
